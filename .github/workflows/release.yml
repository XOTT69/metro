name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify tag and release state
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          expected_tag="v$version"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version. Expected $expected_tag." >&2
            exit 1
          fi

          if gh release view "$expected_tag" > /dev/null 2>&1; then
            exists="true"
            echo "Release $expected_tag already exists; no duplicate publication is needed."
          else
            exists="false"
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.release.outputs.exists != 'true'
        run: npm install --no-audit --no-fund
      - name: Typecheck
        if: steps.release.outputs.exists != 'true'
        run: npm run typecheck
      - name: Validate metro data and routes
        if: steps.release.outputs.exists != 'true'
        run: npm run validate:data
      - name: Build production PWA
        if: steps.release.outputs.exists != 'true'
        run: npm run build
      - name: Validate production bundle
        if: steps.release.outputs.exists != 'true'
        run: npm run validate:dist
      - name: Package release artifact
        if: steps.release.outputs.exists != 'true'
        shell: bash
        run: |
          archive="metro-kyiv-${GITHUB_REF_NAME}.zip"
          (cd dist && zip -qr "../$archive" .)
          sha256sum "$archive" > "$archive.sha256"
          echo "RELEASE_ARCHIVE=$archive" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RELEASE_ARCHIVE" \
            "$RELEASE_ARCHIVE.sha256" \
            --verify-tag \
            --generate-notes \
            --title "Metro Kyiv $GITHUB_REF_NAME"
