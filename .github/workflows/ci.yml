name: Validate PWA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
      - name: Stop on type errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Validate metro data and routes
        run: npm run validate:data
      - name: Build PWA
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
      - name: Stop on build errors
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Validate production bundle
        run: npm run validate:dist
      - name: Lighthouse accessibility and SEO
        id: lighthouse
        continue-on-error: true
        run: npm run audit:lighthouse 2>&1 | tee lighthouse.log
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-reports
            .lighthouseci
            lighthouse.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Stop on Lighthouse regressions
        if: steps.lighthouse.outcome == 'failure'
        run: exit 1
