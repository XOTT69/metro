name: Validate PWA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
      - name: Stop on type errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Validate metro data and routes
        run: npm run validate:data
      - name: Build PWA
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
      - name: Stop on build errors
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Validate production bundle
        id: dist
        continue-on-error: true
        run: |
          set -o pipefail
          find dist -maxdepth 3 -type f -printf '%p %s bytes\n' | sort | tee dist-validation.log
          npm run validate:dist 2>&1 | tee -a dist-validation.log
      - name: Upload production bundle diagnostics
        if: steps.dist.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dist-validation-diagnostics
          path: dist-validation.log
      - name: Stop on production bundle errors
        if: steps.dist.outcome == 'failure'
        run: exit 1
      - name: Smoke production bundle locally
        id: local_smoke
        continue-on-error: true
        run: |
          set -o pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > smoke-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill "$PREVIEW_PID" 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            cat smoke-preview.log
            echo "Vite preview did not become ready for smoke testing" >&2
            exit 1
          fi

          SMOKE_RETRIES=1 npm run smoke:production -- http://127.0.0.1:4173/ 2>&1 | tee smoke.log
      - name: Upload local smoke diagnostics
        if: steps.local_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: local-smoke-diagnostics
          path: |
            smoke-report.json
            smoke.log
            smoke-preview.log
          if-no-files-found: ignore
      - name: Stop on local smoke errors
        if: steps.local_smoke.outcome == 'failure'
        run: exit 1
      - name: Lighthouse accessibility and SEO
        id: lighthouse
        continue-on-error: true
        run: |
          set -o pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill "$PREVIEW_PID" 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            cat preview.log
            echo "Vite preview did not become ready" >&2
            exit 1
          fi

          curl --fail --silent --show-error 'http://127.0.0.1:4173/?tab=stations&station=vokzalna' > /dev/null
          npm run audit:lighthouse 2>&1 | tee lighthouse.log
      - name: Verify Lighthouse reports
        id: lighthouse_verify
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate:lighthouse 2>&1 | tee -a lighthouse.log
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-reports
            .lighthouseci
            lighthouse.log
            preview.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Stop on Lighthouse regressions
        if: steps.lighthouse.outcome == 'failure' || steps.lighthouse_verify.outcome == 'failure'
        run: exit 1
